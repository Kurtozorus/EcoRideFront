<div class="hero-scene container-fluid">
  <div class="hero-scene_content">
    <div class="big-title text-center">
      <h2 class="text-primary">
        Partagez votre trajet, économisez et roulez plus vert
      </h2>
      <p class="text-primary">Trouver le covoiturage qui vous convient !</p>
    </div>
    <div class="container">
      <form id="routeForm">
        <div class="desktop-research">
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-geo-alt"></i>
            </span>
            <input
              type="text"
              class="form-control"
              placeholder="Point de départ"
            />
          </div>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-geo"></i>
            </span>
            <input
              type="text"
              class="form-control"
              placeholder="Point d'arrivée"
            />
          </div>
          <div class="d-flex">
            <div class="input-group size-research">
              <input
                type="date"
                id="departureDate"
                class="form-control"
                placeholder="Aujourd’hui"
              />
            </div>
            <div class="input-group size-research">
              <input
                type="date"
                id="returnDate"
                class="form-control"
                placeholder="Retour"
              />
            </div>
          </div>
          <button class="btn btn-secondary w-100">Rechercher</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="container research-background"></div>
<div class="main-content"></div>
